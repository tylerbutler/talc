name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Default-deny: each job grants only the permissions it actually needs.
permissions: {}

jobs:
  # PR title conventional commit validation.
  #
  # SECURITY: This job deliberately does NOT check out PR code. The PR title
  # comes from the event payload via an environment variable, and commitlint
  # is installed in a scratch directory under $RUNNER_TEMP with
  # `--ignore-scripts` so no package.json, .npmrc, or lifecycle hook from
  # the PR can execute here.
  title:
    name: PR Title
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install commitlint (isolated from PR workspace)
        working-directory: ${{ runner.temp }}
        run: |
          npm init -y >/dev/null
          npm install --no-save --ignore-scripts \
            @commitlint/cli @commitlint/config-conventional
          echo 'module.exports = { extends: ["@commitlint/config-conventional"] };' \
            > commitlint.config.js

      - name: Validate PR title
        working-directory: ${{ runner.temp }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npx --no-install commitlint

  # Changelog entry check
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: tylerbutler/actions/changie-check@c697a813534c6364a835de8e2ed2c4e0c3638bbe # ratchet:tylerbutler/actions/changie-check@main
        id: changelog
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
      - name: Comment with changelog preview
        if: steps.changelog.outputs.has-entries == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog
          message: |
            ## Changelog Preview

            This PR adds the following changelog entries:

            ${{ steps.changelog.outputs.preview }}
      - name: Comment about missing changelog
        if: steps.changelog.outputs.has-entries == 'false' && steps.changelog.outputs.needs-entry == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog
          message: |
            ## Missing Changelog Entry

            This PR includes commits with types that typically require a changelog entry (`${{ steps.changelog.outputs.commit-types-found }}`), but no changie fragment was found.

            To add one, run:

            ```
            changie new
            ```
      - name: Remove changelog comment
        if: steps.changelog.outputs.has-entries == 'false' && steps.changelog.outputs.needs-entry == 'false'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog
          delete: true
